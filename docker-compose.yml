services:
  servix:
    build: .
    container_name: servix
    ports:
      - "4505:3000"
    environment:
      SITE_TITLE: "SERVIX"
      DATA_DIR: "/app/data"
      # Platega-креды проще задать через админку (Настройки) — они сохраняются в БД
      # и приоритетнее env. Раскомментируйте и впишите свои значения, если предпочитаете env:
      # PLATEGA_MERCHANT_ID: "your_platega_merchant_id"
      # PLATEGA_SECRET: "your_platega_secret"
      # TZ: "Europe/Moscow"
      # TELEGRAM_NOTIFY_URL: "tgram://TOKEN/CHAT_ID:TOPIC_ID"
      # NOTIFY_ON_START: "true"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
